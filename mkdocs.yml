site_name: IMAP Spam Cleaner
site_url: https://dominicgisler.github.io/imap-spam-cleaner
repo_url: https://github.com/dominicgisler/imap-spam-cleaner

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

theme:
  name: material
  features:
    - content.code.copy
    - content.code.select
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

nav:
  - Getting started: getting-started.md
  - Configuration:
    - Overview: configuration/index.md
    - Logging: configuration/logging.md
    - Providers: configuration/providers.md
    - Whitelists: configuration/whitelists.md
    - Inboxes: configuration/inboxes.md
  - Providers:
      - AI: providers/ai.md
      - OpenAI: providers/openai.md
      - Ollama: providers/ollama.md
      - SpamAssassin: providers/spamassassin.md
